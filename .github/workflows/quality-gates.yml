name: Quality Gates

# ADR-0010 Phase 2: quality gates (lint / format / coverage) per language.
# Each job runs only if its language is present in the repo (detected via
# hashFiles glob). dev-templates itself triggers only the `python` job.
# Downstream repos that apply this workflow via apply-to-project.sh will
# trigger the appropriate job(s) for their stack.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write  # auto-fix proposals comment from quality-autofix.yml

jobs:
  python:
    name: Python (ruff + pytest --cov)
    runs-on: ubuntu-latest
    if: hashFiles('**/*.py') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          # Project deps (when requirements exist).
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # Quality tooling (pinned to currently-tested versions).
          pip install 'ruff>=0.15' 'pytest>=8' 'pytest-cov>=7'
      - name: ruff check (lint)
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: pytest with coverage
        # `--cov-fail-under=<threshold>` is read from pyproject.toml
        # (`[tool.pytest.ini_options].addopts`). The threshold is intentionally
        # conservative at launch (ADR-0010 Phase 2 = 50%) and will be raised
        # in a follow-up ADR after one month of operation.
        run: pytest

  android:
    name: Android (ktlint + JaCoCo)
    runs-on: ubuntu-latest
    if: hashFiles('**/build.gradle*') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Verify gradle wrapper is present
        run: |
          if [ ! -f gradlew ]; then
            echo "ERROR: no gradlew wrapper. Run `gradle wrapper` to add it." >&2
            exit 1
          fi
      - name: ktlint check
        # If ktlint is wired into the build (e.g. via the ktlint-gradle plugin),
        # the standard task is `ktlintCheck`. Adjust per project.
        run: ./gradlew ktlintCheck --no-daemon || ./gradlew lintKotlin --no-daemon || true
      - name: Unit tests + JaCoCo
        run: ./gradlew test jacocoTestReport --no-daemon
      # Coverage threshold enforcement is project-specific (jacocoTestCoverageVerification
      # task with `minimum = 0.50` is the standard idiom). The template at
      # templates/quality/android/jacoco.gradle.template provides a starting point.

  web:
    name: Web (ESLint + Prettier + Vitest)
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Detect package manager + install
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm ci
          fi
      - name: ESLint
        run: |
          if [ -f eslint.config.mjs ] || [ -f .eslintrc.* ] || [ -f eslint.config.js ]; then
            npx eslint .
          else
            echo "(no ESLint config found, skipping)"
          fi
      - name: Prettier --check
        run: |
          if [ -f prettier.config.mjs ] || [ -f .prettierrc.* ] || [ -f prettier.config.js ]; then
            npx prettier --check .
          else
            echo "(no Prettier config found, skipping)"
          fi
      - name: Vitest with coverage
        # Coverage threshold is set in vitest.config.ts; see
        # templates/quality/web/vitest.config.ts.template for the standard idiom.
        run: |
          if [ -f vitest.config.ts ] || [ -f vitest.config.mjs ] || [ -f vitest.config.js ]; then
            npx vitest run --coverage
          else
            echo "(no Vitest config found, skipping)"
          fi
